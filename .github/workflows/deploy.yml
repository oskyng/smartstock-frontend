name: Build, Test & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  DOCKERHUB_NAMESPACE: oskyng
  IMAGE_NAME: smartstock-frontend

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # Gate: si los tests fallan, el job termina aquí y no se construye ni despliega imagen.
      - name: Run tests
        run: npm test -- --watch=false

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      # El servicio "frontend" vive en el docker-compose.yml que el pipeline de
      # smartstock-backend mantiene sincronizado por scp en DEPLOY_PATH (misma red Docker
      # que bff-service, requerida por el proxy de nginx.conf). El servidor no tiene ningún
      # repo clonado: solo ese docker-compose.yml y las imágenes de Docker Hub. DEPLOY_HOST/
      # DEPLOY_USER/DEPLOY_SSH_KEY/DEPLOY_PATH deben configurarse en este repo con los mismos
      # valores que en smartstock-backend (mismo servidor, misma carpeta).
      - name: Pull, recrear, health-check y rollback automático si falla
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set +e
            cd "${{ secrets.DEPLOY_PATH }}"

            cid=$(docker compose ps -q frontend)
            OLD_IMAGE=""
            if [ -n "$cid" ]; then
              OLD_IMAGE=$(docker inspect --format='{{.Image}}' "$cid")
            fi

            docker compose pull frontend
            docker compose up -d --no-deps --force-recreate frontend

            ok=0
            code="000"
            for i in $(seq 1 20); do
              sleep 3
              code=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost/")
              if [ "$code" = "200" ]; then
                ok=1
                break
              fi
            done

            if [ "$ok" = "1" ]; then
              echo "OK: frontend saludable"
              docker image prune -f
            else
              echo "FALLO: frontend no respondió saludable tras el deploy (último código HTTP: $code)"
              if [ -n "$OLD_IMAGE" ]; then
                docker tag "$OLD_IMAGE" "oskyng/smartstock-frontend:latest"
                docker compose up -d --no-deps --force-recreate frontend
                echo "Revertido: frontend -> $OLD_IMAGE"
              else
                echo "Sin imagen previa registrada para frontend: no se puede revertir automáticamente."
              fi
              docker image prune -f
              exit 1
            fi
            docker image prune -f
