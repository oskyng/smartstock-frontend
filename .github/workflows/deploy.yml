name: Build, Test & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  DOCKERHUB_NAMESPACE: oskyng
  IMAGE_NAME: smartstock-frontend

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # Gate: si los tests fallan, el job termina aquí y no se construye ni despliega imagen.
      - name: Run tests
        run: npm test -- --watch=false

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      # El servicio "frontend" vive en el docker-compose.yml del repo smartstock-backend
      # (misma red Docker que bff-service, requerida por el proxy de nginx.conf). DEPLOY_PATH
      # debe apuntar al checkout de smartstock-backend en el servidor, y DEPLOY_HOST/DEPLOY_USER/
      # DEPLOY_SSH_KEY deben configurarse en este repo con los mismos valores que en
      # smartstock-backend (mismo servidor).
      - name: Pull y recrear el contenedor frontend en el servidor
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose pull frontend
            docker compose up -d --no-deps --force-recreate frontend
            docker image prune -f
