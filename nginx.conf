server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Comprime las respuestas de texto (JS/CSS/HTML) servidas por Angular.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy hacia el BFF. En docker-compose, "bff-service" resuelve por DNS interno del stack.
    # Se resuelve en runtime (variable + resolver) para que nginx no falle al iniciar si el
    # backend todavía no está disponible (orden de arranque del stack).
    resolver 127.0.0.11 valid=30s;

    location /api/ {
        set $bff_upstream bff-service:8080;
        # OJO: con un $variable en proxy_pass, nginx deja de hacer el reemplazo automático
        # del prefijo de location -> hay que reconstruir la ruta a mano con $request_uri,
        # o cualquier request quedaría truncado literalmente a "/api/".
        proxy_pass http://$bff_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Necesario para que el stream SSE (GET /api/v1/bff/audit/stream) no quede bufferizado.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding off;
    }

    # Fallback de enrutamiento SPA: cualquier ruta no-archivo cae en index.html (Angular Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cachear agresivamente los assets con hash en el nombre (JS/CSS de build de producción).
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
